  <text x="34" y="164" fill="#6D5B49" font-size="18" font-family="Manrope, Arial, sans-serif">Research what exists, where it breaks for</text>
  <text x="34" y="190" fill="#6D5B49" font-size="18" font-family="Manrope, Arial, sans-serif">small nonprofits, and where AI can reduce</text>
  <text x="34" y="216" fill="#6D5B49" font-size="18" font-family="Manrope, Arial, sans-serif">operational friction.</text>

