  <text x="34" y="658" fill="#6D5B49" font-size="16" font-family="Manrope, Arial, sans-serif">• Cost burden for small teams</text>
  <text x="34" y="690" fill="#6D5B49" font-size="16" font-family="Manrope, Arial, sans-serif">• Multilingual and regional readiness</text>
  <text x="34" y="722" fill="#6D5B49" font-size="16" font-family="Manrope, Arial, sans-serif">• Low-bandwidth and mobile practicality</text>
  <text x="34" y="754" fill="#6D5B49" font-size="16" font-family="Manrope, Arial, sans-serif">• Admin overhead to maintain</text>
  <text x="34" y="786" fill="#6D5B49" font-size="16" font-family="Manrope, Arial, sans-serif">• Where AI saves time without risk</text>

