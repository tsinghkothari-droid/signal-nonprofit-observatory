  <text x="374" y="1030" fill="#6D5B49" font-size="14" font-family="Manrope, Arial, sans-serif">Cheap and common, but brittle across forms and chats.</text>
  <text x="640" y="1019" fill="#6D5B49" font-size="13" font-family="IBM Plex Mono, monospace">IMPACT REPORTING</text>
