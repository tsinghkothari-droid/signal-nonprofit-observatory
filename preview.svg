  <text x="380" y="236" fill="#6D5B49" font-size="19" font-family="Manrope, Arial, sans-serif">Search vendor categories, spot underserved segments, and compare AI opportunities</text>
  <text x="380" y="263" fill="#6D5B49" font-size="19" font-family="Manrope, Arial, sans-serif">that are practical for small global teams.</text>

